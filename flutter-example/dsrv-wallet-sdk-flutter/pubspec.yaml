name: dsrv_wallet_sdk
description: DSRV MPC Wallet SDK for Flutter
version: 0.9.0
homepage: https://dsrv.com

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.dsrv.wallet.flutter
        pluginClass: DsrvWalletSdkPlugin
      ios:
        pluginClass: DsrvWalletSdkPlugin
